{% extends 'myapp/base.html' %}

{% block content %}
    <h2>All Students</h2>

    {% for student in students %}
        <div class="student-card">
            <p>
                <a href="/student/{{ student.id }}/">
                    <strong>{{ student.name }}</strong>
                </a> 
                — {{ student.course }}
            </p>
        </div>
    {% endfor %}
{% endblock %}
