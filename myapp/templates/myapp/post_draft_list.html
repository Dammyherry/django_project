{% extends 'myapp/base.html' %}

{% block content %}
    <h2>Draft Posts</h2>
    {% for post in posts %}
        <div class="post">
            <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>Created: {{ post.created_date }}</p>
        </div>
    {% empty %}
        <p>No drafts yet!</p>
    {% endfor %}
{% endblock %}
