{% extends 'myapp/base.html' %}

{% block content %}
    <h2>Posts</h2>
    {% if posts %}
        {% for post in posts %}
            <div class="post">
                <div class="date">
                    <p>published: {{ post.published_date }}</p>
                </div>
                <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
                <p>{{ post.text|linebreaksbr }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No posts found!</p>
    {% endif %}
{% endblock %}
